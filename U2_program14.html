<body>

    <h2>List of Countries</h2>

    <h3>Unordered List (Bullets)</h3>
    <ul>
        <li>India</li>
        <li>United States</li>
        <li>Japan</li>
        <li>Germany</li>
        <li>Australia</li>
    </ul>

    <hr>

    <h3>Ordered List (Numbering)</h3>
    <ol>
        <li>Canada</li>
        <li>Brazil</li>
        <li>France</li>
        <li>South Africa</li>
        <li>South Korea</li>
    </ol>

</body>

</html>
