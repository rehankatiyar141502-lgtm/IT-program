<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    * { font-family: sans-serif; } /* Universal */
    div { border: 1px solid black; } /* Element */
    .myClass { color: orange; } /* Class */
    #myID { font-weight: bold; } /* ID */
</style>

</head>
<body>
    
<div class="myClass">Class Selector Text</div>
<p id="myID">ID Selector Text</p>
</body>
</html>
