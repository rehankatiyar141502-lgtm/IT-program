<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    td { width: 50px; height: 50px; border: 1px solid #000; text-align: center; }
    .red-cell:hover { background-color: red; }
    .blue-cell:hover { background-color: blue; color: white; }
    .yellow-cell:hover { background-color: yellow; }
</style>

</head>
<body>
    <table>
    <tr>
        <td class="red-cell">Red</td>
        <td class="blue-cell">Blue</td>
        <td class="yellow-cell">Yellow</td>
    </tr>
    </table>
</body>
</html>
